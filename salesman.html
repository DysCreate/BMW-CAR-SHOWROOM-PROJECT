<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMW Salesman Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0b0b; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 14px; }
    a { color: inherit; text-decoration: none; }

    .dash-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .dash-nav h1 { font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    .dash-nav h1 span { color: #f0ad4e; }
    .dash-nav-right { display: flex; align-items: center; gap: 24px; }
    .dash-nav-right span { font-size: 12px; color: #888; }
    .logout-btn {
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 20px; border: 1px solid #f0ad4e; color: #f0ad4e; cursor: pointer;
      background: none; transition: all 0.3s;
    }
    .logout-btn:hover { background: #f0ad4e; color: #000; }

    .dash-body { max-width: 1200px; margin: 0 auto; padding: 40px; }

    .tabs {
      display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab {
      padding: 14px 28px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #555; cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }
    .tab:hover { color: #aaa; }
    .tab.active { color: #f0ad4e; border-bottom-color: #f0ad4e; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .dash-section { margin-bottom: 40px; }
    .dash-section h2 {
      font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      color: #666; margin-bottom: 20px;
    }

    .dash-table { width: 100%; border-collapse: collapse; }
    .dash-table th {
      text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: #555; padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .dash-table td {
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px; color: #ccc;
    }
    .dash-table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block; padding: 4px 12px; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .badge-pending { border: 1px solid #f0ad4e; color: #f0ad4e; }
    .badge-approved { border: 1px solid #4da6e8; color: #4da6e8; }
    .badge-rejected { border: 1px solid #c0392b; color: #c0392b; }

    .action-btn {
      padding: 5px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer; border: none; transition: all 0.3s;
      margin-right: 6px;
    }
    .approve-btn { background: #4da6e8; color: #fff; }
    .approve-btn:hover { background: #3a8fd0; }
    .reject-btn { background: none; border: 1px solid #c0392b; color: #c0392b; }
    .reject-btn:hover { background: #c0392b; color: #fff; }

    /* Reviews */
    .review-card {
      background: #111; border: 1px solid rgba(255,255,255,0.06); padding: 24px;
      margin-bottom: 16px;
    }
    .review-card .review-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .review-card .review-header h4 { font-size: 14px; font-weight: 700; }
    .review-card .review-header span { font-size: 11px; color: #555; }
    .review-card .review-body { color: #aaa; font-size: 13px; line-height: 1.7; margin-bottom: 16px; font-style: italic; }
    .review-card .review-reply { background: rgba(255,255,255,0.03); padding: 14px; border-left: 2px solid #f0ad4e; margin-top: 12px; }
    .review-card .review-reply p { font-size: 12px; color: #888; }
    .review-card .review-reply strong { color: #f0ad4e; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

    .reply-form { display: flex; gap: 8px; margin-top: 12px; }
    .reply-form input {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 10px 14px; font-size: 13px; font-family: inherit; outline: none;
    }
    .reply-form input:focus { border-color: #f0ad4e; }
    .reply-form input::placeholder { color: #555; }
    .reply-form button {
      background: #f0ad4e; color: #000; border: none; padding: 10px 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s;
    }
    .reply-form button:hover { background: #e09a3e; }

    .empty { color: #555; font-size: 13px; padding: 20px 0; }

    @media (max-width: 768px) {
      .dash-body { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <nav class="dash-nav">
    <h1>BMW <span>Sales</span></h1>
    <div class="dash-nav-right">
      <span id="sales-email"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dash-body">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('drives')">Test Drives</div>
      <div class="tab" onclick="switchTab('reviews')">Reviews</div>
    </div>

    <!-- Test Drives Tab -->
    <div class="tab-content active" id="tab-drives">
      <div class="dash-section">
        <h2>Test Drive Requests</h2>
        <table class="dash-table">
          <thead><tr><th>Customer</th><th>Phone</th><th>Model</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="td-table"></tbody>
        </table>
      </div>
    </div>

    <!-- Reviews Tab -->
    <div class="tab-content" id="tab-reviews">
      <div class="dash-section">
        <h2>Customer Reviews</h2>
        <div id="reviews-list"></div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api';
    const user = JSON.parse(localStorage.getItem('bmw_user') || 'null');

    if (!user || user.role !== 'salesman') {
      window.location.href = '/index.html';
    }

    document.getElementById('sales-email').textContent = user?.email || '';

    function logout() {
      localStorage.removeItem('bmw_user');
      window.location.href = '/index.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab-content#tab-${tab}`).classList.add('active');
      event.target.classList.add('active');
    }

    async function loadTestDrives() {
      const res = await fetch(API + '/test-drives');
      const tds = await res.json();
      const tbody = document.getElementById('td-table');

      tbody.innerHTML = tds.length ? tds.map(td => `
        <tr>
          <td>${td.user_name}<br><span style="color:#555;font-size:11px">${td.user_email}</span></td>
          <td>${td.user_phone || '—'}</td>
          <td>${td.car_model}</td>
          <td>${td.date}</td>
          <td><span class="badge badge-${td.status}">${td.status}</span></td>
          <td>
            ${td.status === 'pending' ? `
              <button class="action-btn approve-btn" onclick="updateTD('${td.id}', 'approved')">Approve</button>
              <button class="action-btn reject-btn" onclick="updateTD('${td.id}', 'rejected')">Reject</button>
            ` : '—'}
          </td>
        </tr>
      `).join('') : '<tr><td colspan="6" class="empty">No test drive requests yet.</td></tr>';
    }

    async function updateTD(id, status) {
      await fetch(API + '/test-drive/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status, assigned_salesman: user.id || user.id })
      });
      loadTestDrives();
    }

    async function loadReviews() {
      const res = await fetch(API + '/reviews');
      const reviews = await res.json();
      const container = document.getElementById('reviews-list');

      container.innerHTML = reviews.length ? reviews.map(r => `
        <div class="review-card">
          <div class="review-header">
            <h4>${r.user_name}</h4>
            <span>${new Date(r.created_at).toLocaleDateString()}</span>
          </div>
          <div class="review-body">"${r.content}"</div>
          ${r.reply ? `
            <div class="review-reply">
              <strong>Your Reply</strong>
              <p>${r.reply}</p>
            </div>
          ` : `
            <form class="reply-form" onsubmit="replyReview(event, '${r.id}')">
              <input type="text" placeholder="Write a reply..." required />
              <button type="submit">Reply</button>
            </form>
          `}
        </div>
      `).join('') : '<p class="empty">No reviews yet.</p>';
    }

    async function replyReview(e, id) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      await fetch(API + '/review-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ review_id: id, reply: input.value })
      });
      loadReviews();
    }

    loadTestDrives();
    loadReviews();
  </script>
</body>
</html>
